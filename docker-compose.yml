services:

  postgres:
    image: postgres:16
    container_name: vinmart-postgres

    environment:
      POSTGRES_DB: vinyldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  catalog-service:
    build:
      context: ./catalog-service

    container_name: catalog-service

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vinyldb
      DB_USER: postgres
      DB_PASSWORD: postgres

    depends_on:
      - postgres

  reservation-service:
    build:
      context: ./reservation-service

    container_name: reservation-service

    ports:
      - "8081:8081"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vinyldb
      DB_USER: postgres
      DB_PASSWORD: postgres

    depends_on:
      - postgres
      - catalog-service
      - notification-service

  notification-service:
    build:
      context: ./notification-service

    container_name: notification-service

    ports:
      - "8082:8082"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vinyldb
      DB_USER: postgres
      DB_PASSWORD: postgres

    depends_on:
      - postgres

  auth-service:
    build:
      context: ./auth-service

    container_name: auth-service

    ports:
      - "8083:8083"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vinyldb
      DB_USER: postgres
      DB_PASSWORD: postgres

    depends_on:
      - postgres

volumes:
  postgres_data: